name: Build Binaries

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            build_dir: .
            cabal_file: stellar-veritas.cabal
            artifact_os: linux
          - os: macos-latest
            build_dir: src
            cabal_file: stellar-veritas.cabal
            artifact_os: macos

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Haskell
        uses: haskell-actions/setup@v2
        with:
          ghc-version: "9.12.3"
          cabal-version: "latest"

      - name: Cache Cabal store
        uses: actions/cache@v4
        with:
          path: |
            ~/.cabal/store
            dist-newstyle
          key: ${{ runner.os }}-${{ runner.arch }}-ghc-9.12.3-cabal-${{ hashFiles('**/*.cabal') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-ghc-9.12.3-cabal-

      - name: Build binary
        shell: bash
        run: |
          set -euo pipefail
          cd "${{ matrix.build_dir }}"
          cabal update
          cabal build exe:stellar-veritas

      - name: Package binary
        shell: bash
        run: |
          set -euo pipefail

          cd "${{ matrix.build_dir }}"
          version="$(awk '/^version:/ {print $2; exit}' "${{ matrix.cabal_file }}")"
          binary_path="$(cabal list-bin exe:stellar-veritas)"

          os_name="${{ matrix.artifact_os }}"
          arch_name="$(echo "${RUNNER_ARCH}" | tr '[:upper:]' '[:lower:]')"
          package_name="stellar-veritas-${version}-${os_name}-${arch_name}"
          package_root="../dist/package"
          archive_root="../dist"
          package_dir="${package_root}/${package_name}"
          archive_path="${archive_root}/${package_name}.tar.gz"

          mkdir -p "${package_dir}"
          install -m 755 "${binary_path}" "${package_dir}/stellar-veritas"
          cp ../README.md ../COPYING "${package_dir}/"

          tar -C "${package_root}" -czf "${archive_path}" "${package_name}"

          echo "ASSET_NAME=${package_name}.tar.gz" >> "${GITHUB_ENV}"
          echo "ASSET_PATH=${archive_path}" >> "${GITHUB_ENV}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET_NAME }}
          path: ${{ env.ASSET_PATH }}

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 || \
            gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --generate-notes || true

          gh release upload "${GITHUB_REF_NAME}" "${ASSET_PATH}" --clobber
