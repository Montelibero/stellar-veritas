name: Build Binaries

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            build_dir: .
            cabal_file: stellar-veritas.cabal
            artifact_os: linux
            repo_root: .
            package_root: dist/package
            archive_root: dist
            use_external_stellar_sdk: false
            ghc_version: 9.12.3
          - os: macos-latest
            build_dir: src
            cabal_file: stellar-veritas.cabal
            artifact_os: macos
            repo_root: ..
            package_root: ../dist/package
            archive_root: ../dist
            use_external_stellar_sdk: true
            ghc_version: 9.8.4

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Haskell
        uses: haskell-actions/setup@v2
        with:
          ghc-version: ${{ matrix.ghc_version }}
          cabal-version: "latest"

      - name: Cache Cabal store
        uses: actions/cache@v4
        with:
          path: |
            ~/.cabal/store
            dist-newstyle
          key: ${{ runner.os }}-${{ runner.arch }}-ghc-${{ matrix.ghc_version }}-cabal-${{ hashFiles('**/*.cabal') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-ghc-${{ matrix.ghc_version }}-cabal-

      - name: Build binary
        shell: bash
        run: |
          set -euo pipefail
          cd "${{ matrix.build_dir }}"

          if [ "${{ matrix.use_external_stellar_sdk }}" = "true" ]; then
            printf '%s\n' \
              'packages: .' \
              '' \
              'source-repository-package' \
              '  type: git' \
              '  location: https://github.com/cblp/haskell-stellar-sdk.git' \
              '  tag: 756e3aa04c28fde502e239fac9da3dd1d1ee31bb' \
              '  subdir:' \
              '    .' \
              '    stellar-horizon' \
              > cabal.project.local
          fi

          cabal update
          cabal build exe:stellar-veritas

      - name: Package binary
        shell: bash
        run: |
          set -euo pipefail

          cd "${{ matrix.build_dir }}"
          version="$(awk '/^version:/ {print $2; exit}' "${{ matrix.cabal_file }}")"
          binary_path="$(cabal list-bin exe:stellar-veritas)"

          os_name="${{ matrix.artifact_os }}"
          arch_name="$(echo "${RUNNER_ARCH}" | tr '[:upper:]' '[:lower:]')"
          package_name="stellar-veritas-${version}-${os_name}-${arch_name}"
          package_root="${{ matrix.package_root }}"
          archive_root="${{ matrix.archive_root }}"
          repo_root="${{ matrix.repo_root }}"
          package_dir="${package_root}/${package_name}"
          archive_path="${archive_root}/${package_name}.tar.gz"

          mkdir -p "${package_dir}"
          install -m 755 "${binary_path}" "${package_dir}/stellar-veritas"
          cp "${repo_root}/README.md" "${repo_root}/COPYING" "${package_dir}/"

          tar -C "${package_root}" -czf "${archive_path}" "${package_name}"

          echo "ASSET_NAME=${package_name}.tar.gz" >> "${GITHUB_ENV}"
          echo "ASSET_PATH=${archive_path}" >> "${GITHUB_ENV}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET_NAME }}
          path: ${{ env.ASSET_PATH }}

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 || \
            gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --generate-notes || true

          gh release upload "${GITHUB_REF_NAME}" "${ASSET_PATH}" --clobber
